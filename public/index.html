<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Meet</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 10px; width: 90%; margin-top: 20px; }
        video { width: 100%; border-radius: 10px; background: #222; transform: scaleX(-1); }
        .controls { margin-top: 20px; padding: 10px; background: #333; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>Room: <span id="room-id">7077</span></h2>
    
    <div id="video-grid"></div>

    <div class="controls">
        <p>Share this page URL with a friend to join.</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/');
        const videoGrid = document.getElementById('video-grid');
        const myVideo = document.createElement('video');
        myVideo.muted = true; // Mute your own audio for yourself

        // 1. Setup WebRTC Configuration (The STUN servers)
        const config = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        const peers = {};
        const roomID = window.location.pathname.split('/')[1] || "7077";
        document.getElementById('room-id').innerText = roomID;

        // 2. Get Camera and Mic
        navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        }).then(stream => {
            addVideoStream(myVideo, stream);

            socket.emit('join-room', roomID, socket.id);

            socket.on('user-connected', userId => {
                connectToNewUser(userId, stream);
            });
        });

        socket.on('user-disconnected', userId => {
            if (peers[userId]) peers[userId].close();
        });

        function connectToNewUser(userId, stream) {
            const pc = new RTCPeerConnection(config);
            peers[userId] = pc;

            // Add our tracks to the connection
            stream.getTracks().forEach(track => pc.addTrack(track, stream));

            // When we receive a track from the other person
            pc.ontrack = event => {
                const bVideo = document.createElement('video');
                addVideoStream(bVideo, event.streams[0]);
            };

            // Basic signaling (This is a simplified version for your custom site)
            pc.onicecandidate = event => {
                if (event.candidate) {
                    socket.emit('signal', { to: userId, candidate: event.candidate });
                }
            };
        }

        function addVideoStream(video, stream) {
            video.srcObject = stream;
            video.addEventListener('loadedmetadata', () => {
                video.play();
            });
            videoGrid.append(video);
        }
    </script>
</body>
</html>
