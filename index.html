<!DOCTYPE html>
<html>
<head>
    <title>MilanoVoIP Local</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { background: #2a2a2a; padding: 25px; border-radius: 15px; border: 1px solid #444; }
        
        /* THE INTERACTABLE INPUT */
        input { 
            width: 80%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 2px solid #00d1b2; 
            font-size: 18px;
            background: #fff;
            color: #000;
        }

        button { padding: 15px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .join { background: #00d1b2; color: white; width: 85%; }
        .mute { background: #555; color: white; }
        .hangup { background: #ff3860; color: white; }
        
        #video-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        video { width: 100%; border-radius: 10px; background: #000; }
    </style>
</head>
<body>

    <h2>MilanoVoIP.com</h2>

    <div id="setup" class="box">
        <p>Enter Room Name to Start:</p>
        <input type="text" id="roomInput" placeholder="Ex: 7077" autofocus>
        <button class="join" onclick="startCall()">JOIN MEETING</button>
    </div>

    <div id="video-grid"></div>

    <div id="controls" style="display:none; margin-top:20px;">
        <button class="mute" id="micBtn" onclick="toggleMic()">Mute Mic</button>
        <button class="mute" id="camBtn" onclick="toggleCam()">Stop Video</button>
        <button class="hangup" onclick="location.reload()">End Call</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let myStream;
        const socket = io();

        function startCall() {
            const room = document.getElementById('roomInput').value || "7077";
            document.getElementById('setup').style.display = 'none';
            document.getElementById('controls').style.display = 'block';

            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(stream => {
                myStream = stream;
                const v = document.createElement('video');
                v.muted = true;
                v.srcObject = stream;
                v.onloadedmetadata = () => v.play();
                document.getElementById('video-grid').append(v);

                socket.emit('join-room', room, socket.id);
            });
        }

        function toggleMic() {
            const track = myStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('micBtn').innerText = track.enabled ? "Mute Mic" : "Unmute Mic";
        }

        function toggleCam() {
            const track = myStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            document.getElementById('camBtn').innerText = track.enabled ? "Stop Video" : "Start Video";
        }
    </script>
</body>
</html>
