<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilanoVoIP.com</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; }
        h2 { color: #00d1b2; margin-bottom: 10px; }
        #video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 100%; max-width: 1000px; }
        video { width: 100%; border-radius: 12px; background: #222; transform: scaleX(-1); border: 2px solid #333; }
        
        .setup-box { background: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #444; width: 90%; max-width: 400px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 70%; margin-bottom: 10px; }
        button { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        
        .join-btn { background: #00d1b2; color: white; }
        .control-btn { background: #444; color: white; }
        .leave-btn { background: #ff3860; color: white; }
        .active-off { background: #ff3860 !important; }
    </style>
</head>
<body>

    <h2>MilanoVoIP.com</h2>

    <div class="setup-box" id="setup-area">
        <input type="text" id="room-input" placeholder="Enter Room Name (e.g. 7077)">
        <button class="join-btn" onclick="joinRoom()">Join / Create Room</button>
    </div>

    <div id="video-grid"></div>

    <div id="controls-area" style="display:none; margin-top: 20px;">
        <button class="control-btn" id="mute-btn" onclick="toggleAudio()">Mute Mic</button>
        <button class="control-btn" id="video-btn" onclick="toggleVideo()">Stop Video</button>
        <button class="leave-btn" onclick="leaveCall()">Decline / Hang Up</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('/');
        const videoGrid = document.getElementById('video-grid');
        const myVideo = document.createElement('video');
        myVideo.muted = true;

        let myStream;
        const peers = {};
        const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        function joinRoom() {
            const roomName = document.getElementById('room-input').value || "7077";
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('controls-area').style.display = 'block';

            navigator.mediaDevices.getUserMedia({ video: true, audio: true }).then(stream => {
                myStream = stream;
                addVideoStream(myVideo, stream);

                socket.emit('join-room', roomName, socket.id);

                socket.on('user-connected', userId => {
                    const pc = new RTCPeerConnection(config);
                    peers[userId] = pc;
                    stream.getTracks().forEach(track => pc.addTrack(track, stream));
                    pc.ontrack = e => {
                        const v = document.createElement('video');
                        addVideoStream(v, e.streams[0]);
                    };
                    pc.onicecandidate = e => {
                        if (e.candidate) socket.emit('signal', { to: userId, candidate: e.candidate });
                    };
                });
            });
        }

        function toggleAudio() {
            const enabled = myStream.getAudioTracks()[0].enabled;
            myStream.getAudioTracks()[0].enabled = !enabled;
            document.getElementById('mute-btn').innerText = !enabled ? "Mute Mic" : "Unmute Mic";
            document.getElementById('mute-btn').classList.toggle('active-off');
        }

        function toggleVideo() {
            const enabled = myStream.getVideoTracks()[0].enabled;
            myStream.getVideoTracks()[0].enabled = !enabled;
            document.getElementById('video-btn').innerText = !enabled ? "Stop Video" : "Start Video";
            document.getElementById('video-btn').classList.toggle('active-off');
        }

        function leaveCall() {
            window.location.reload(); // Simplest way to "Decline" or "Hang up"
        }

        function addVideoStream(video, stream) {
            video.srcObject = stream;
            video.addEventListener('loadedmetadata', () => video.play());
            videoGrid.append(video);
        }
    </script>
</body>
</html>
